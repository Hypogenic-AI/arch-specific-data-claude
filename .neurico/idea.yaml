idea:
  title: Architecture-Specific Data Attractors
  domain: machine_learning
  hypothesis: 'Different neural network architectures, such as RNNs versus transformer-based
    LLMs, may develop distinct attractors or default responses (e.g., favorite dessert)
    when exposed to similar data and training regimes. This research will test whether
    architectural differences alone are sufficient to prevent or alter persona collapse,
    and whether sufficiently capable RNNs would converge to the same attractors as
    LLMs.

    '
  background:
    description: 'Essentially all frontier LLMs think tiramisu is their favorite dessert.

      I bet a different architecture, e.g, an RNN might have a different attractor.
      How different do setups need to be to diverge such persona collapse? And would
      a good enough RNN eventually also like tiramisu?

      '
  metadata:
